    .font-heading { font-family: 'Bebas Neue', sans-serif; }

    .font-body { font-family: 'Neue Haas Unica W1G', 'Helvetica Neue', Arial, sans-serif; }

    * { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }

    /* Glass nav */
    .glass-nav {
      background: rgba(28, 28, 28, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(239, 239, 239, 0.08);

    /* Pulse dot */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

    /* Nav link underline */
    .nav-link { position: relative; }
    .nav-link::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px; background: #F64E29;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nav-link:hover::after { width: 100%; }

    /* Page load fade-in */
    body { animation: page-fade-in 1s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes page-fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Page transition overlay */
    .page-transition {
      position: fixed; inset: 0; background: #1C1C1C; z-index: 9999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .page-transition.active { opacity: 1; pointer-events: all; }

    /* Scroll reveal */
    .reveal {
      opacity: 0; transform: translateY(16px);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Project card hover */
    .project-card { transition: transform 0.6s, opacity 0.6s; }
    .project-card:hover { transform: scale(1.01); }
    .project-card:hover .project-thumb { transform: scale(1.05); }
    .project-card:hover .project-number { color: #F64E29; }

    /* Arrow hover */
    span:hover > .arrow-icon { color: #F64E29; }
  </style>
</head>

  <script>
    // ─── Scroll Reveal ───
    const revealEls = document.querySelectorAll('.reveal');
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    revealEls.forEach(el => revealObserver.observe(el));

    // ─── Page Transitions ───
    const transition = document.getElementById('page-transition');
    document.querySelectorAll('a[href$=".html"]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const href = link.getAttribute('href');
        transition.classList.add('active');
        setTimeout(() => { window.location.href = href; }, 400);
      });
    });
  </script>
