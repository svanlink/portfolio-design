  <script>
    // ─── Mobile Menu ───
    const mobileMenu = document.getElementById('mobile-menu');
    const openMenu = () => { mobileMenu.classList.remove('opacity-0', 'pointer-events-none'); mobileMenu.classList.add('opacity-100'); document.body.style.overflow = 'hidden'; if (window.lenis) window.lenis.stop(); };
    const closeMenu = () => { mobileMenu.classList.add('opacity-0', 'pointer-events-none'); mobileMenu.classList.remove('opacity-100'); document.body.style.overflow = ''; if (window.lenis) window.lenis.start(); };
    document.querySelectorAll('.mobile-menu-btn').forEach(btn => btn.addEventListener('click', openMenu));
    document.getElementById('mobile-menu-close').addEventListener('click', closeMenu);
    document.querySelectorAll('.mobile-menu-link').forEach(link => { link.addEventListener('click', closeMenu); });

    // ─── Page Transitions ───
    const transition = document.getElementById('page-transition');
    document.querySelectorAll('a[href$=".html"]').forEach(link => {
      if (link.target === '_blank') return;
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const href = link.getAttribute('href');
        transition.classList.add('active');
        setTimeout(() => { window.location.href = href; }, 400);
      });
    });
  </script>
